name: obsidian-sync
version: 0.5.3
display_name: Obsidian Sync
description: Sync coding session knowledge into an Obsidian vault and recall it later with local search.
short_description: Turn coding sessions into structured Obsidian notes.
long_description: Capture session reports, learnings, follow-up tasks, and ideas in your Obsidian vault, then retrieve them later with qmd-powered local search.
developer_name: jylkim
author:
  name: jylkim
  url: https://github.com/jylkim
repository: https://github.com/jylkim/obsidian-sync
homepage: https://github.com/jylkim/obsidian-sync
license: MIT
category: Productivity
brand_color: "#4F7A67"
keywords:
  - obsidian
  - sync
  - recall
  - qmd
  - knowledge-management
  - pkm
  - multi-agent
default_prompts:
  - Save this session to my Obsidian vault.
  - Recall what we learned about this pattern before.
  - Configure my Obsidian vault for session sync.
common_tag: obsidian-sync
default_folders:
  sessions: Agent/Sessions
  learnings: Agent/Learnings
  tasks: Agent/Tasks
  ideas: Agent/Ideas
  canvas: Agent/Ideas/canvas
  dashboard: Agent/Dashboard
skills:
  - configure
  - recall
  - session-sync
agents:
  - session-drafter
  - til-drafter
  - task-drafter
  - idea-drafter
  - note-reviewer
