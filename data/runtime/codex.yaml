origin_tag: codex
question_style: numbered_list
skill_dir_reference: relative to the current skill directory
agent_prompts_root: support/agents
session_context_mode: fork_context
phase1_model: gpt-5.4-mini
phase1_reasoning_effort: xhigh
creative_model: gpt-5.4
creative_reasoning_effort: xhigh
review_model: gpt-5.4-mini
